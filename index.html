<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reise Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Arima:wght@100..700&family=Palanquin:wght@100;200;300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="script.js"></script>

  <link rel="stylesheet" href="./styles/header_footer.css" />
  <link rel="stylesheet" href="./styles/basic.css" />
  <link rel="stylesheet" href="./styles/style.css" />
  <link rel="stylesheet" href="./styles/page2.css" />
  <link rel="stylesheet" href="./styles/page3.css">
  <link rel="stylesheet" href="./styles/slider.css" />

  <script src="./js/hesder_footer.js"></script>
  <script src="./js/basic.js"></script>
</head>

<body>
  <header id="header-placeholder"></header>

  <section class="top">
    <div></div>
    <img class="img_rotate img_pos" src="./img/Circle.png" alt="Drehendes Bild">
  </section>


  <section class="main">
    <div id="higlight" class="text_zentriert">
      <img src="./img/rocket_launch.png" alt="Lancher" class="img_highlight" />
      <h1 class="font_h1">Highlights</h1>
    </div>
    <section class="slider_a">
      <input type="radio" name="slider" value="img1" checked />
      <input type="radio" name="slider" value="img2" />
      <input type="radio" name="slider" value="img3" />
      <input type="radio" name="slider" value="img4" />
      <div class="slider_a_wrapper">
        <div class="slider_a_element">
          <img src="./img/citty.jpg" alt="Citty" class="element_img1" />
        </div>
        <div class="slider_a_element">
          <img src="./img/fjord.jpg" alt="Fjord" class="element_img2" />
        </div>
        <div class="slider_a_element">
          <img src="./img/strad_su.jpg" alt="Strand" class="element_img3" />
        </div>
        <div class="slider_a_element">
          <img src="./img/beach.jpg" alt="Beach" class="element_img4" />
        </div>
      </div>
    </section>

    <section id="faq" class="zentriert mrg_top faq_main">
      <div class="text_zentriert">
        <img src="./img/rocket_launch.png" alt="Lancher" class="img_highlight" />
        <h1 class="font_h1">FAQ</h1>
      </div>
      <div><img src="./img/placeholder.png" alt="Placeholder" class="img_hold" /></div>
    </section>

    <section id="contact" class="zentriert mrg_top contat_main">
      <div class="text_zentriert">
        <img src="./img/rocket_launch.png" alt="Lancher" class="img_highlight" />
        <h1 class="font_h1">Contact</h1>
      </div>
      <div>
        <form>
          <div class="form-group">
            <label>Vorname :*</label>
            <input type="text" class="form-control" name="v_name" placeholder="" required="required" />
          </div>

          <div class="form-group">
            <label>Nachname :*</label>
            <input type="text" class="form-control" name="text_name" placeholder="" required="required" />
          </div>

          <div class="form-group">
            <label>Nachricht :</label>
            <textarea class="form-control" name="textarea_name" placeholder="Placeholder Textarea">
              </textarea>
          </div>

          <div class="form-group">
            <input type="submit" class="btn btn-primary" name="button_name" value="Senden" />
          </div>
          <small>Mit * markierte Felder sind Pflichtfelder.</small>
        </form>
      </div>
    </section>

  </section>

  <footer id="footer-placeholder"></footer>
</body>

</html>
